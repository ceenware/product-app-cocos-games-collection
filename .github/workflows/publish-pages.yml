name: Publish Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUBLISH_DIR: ../pages-site
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          set -euo pipefail
          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='services' \
            --exclude='partials' \
            --exclude='抖音上架材料' \
            ./ "$PUBLISH_DIR"/

          {
            printf '%s\n' '<!doctype html>'
            printf '%s\n' '<html lang="en">'
            printf '%s\n' '<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Games</title></head>'
            printf '%s\n' '<body><main><h1>Games</h1><ul>'
            while IFS= read -r file; do
              game="${file#"$PUBLISH_DIR"/}"
              game="${game%/index.html}"
              printf '  <li><a href="./%s/">%s</a></li>\n' "$game" "$game"
            done < <(find "$PUBLISH_DIR" -mindepth 2 -maxdepth 2 -name index.html | sort)
            printf '%s\n' '</ul></main></body></html>'
          } > "$PUBLISH_DIR/index.html"

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -f "$PUBLISH_DIR/index.html"
          site="$(mktemp -d)"
          rsync -a --delete "$PUBLISH_DIR"/ "$site"/
          find "$site" -name '.DS_Store' -delete
          touch "$site/.nojekyll"

          cd "$site"
          git init -q
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish pages ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf "$PUBLISH_DIR"
